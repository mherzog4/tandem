# Fly.io config for the Tandem relay. Single instance — sessions live
# in memory, so a host and its guests must land on the same machine
# (scale-out needs session affinity, tracked in issue #60).
#
# First deploy:
#   fly launch --no-deploy         # or `fly apps create tandem-relay`
#   fly deploy --ha=false
# Then set the public base URL so join links point at the real host:
#   fly secrets set TANDEM_BASE_URL=https://tandem-relay.fly.dev
#
# Rename `app` to your own app name before deploying.

app = "tandem-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  TANDEM_ADDR = ":8080"
  # TANDEM_BASE_URL is set via `fly secrets set` (must match the app's
  # public https URL). Falls back to localhost if unset.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"   # keep the single instance warm (in-memory sessions)
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"
