name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For **security** issues, do not file here — see
        [SECURITY.md](https://github.com/mherzog4/tandem/blob/main/SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. tandem --relay ... claude
        2. guest opens the link
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tandem version
      description: Output of `tandem --version`
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS / terminal / wrapped agent
      placeholder: "macOS 14, iTerm2, claude"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
