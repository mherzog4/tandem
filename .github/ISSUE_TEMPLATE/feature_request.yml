name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or use case?
      description: What are you trying to do that Tandem doesn't support well?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: invariant
    attributes:
      label: Security invariant
      options:
        - label: This does not let guests execute anything (guests compose into the prompt only)
          required: true
