<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tandem session</title>
<link rel="stylesheet" href="/static/vendor/xterm.min.css">
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0d1117; color: #e6edf3; font: 14px system-ui, sans-serif; }
  #join { display: flex; flex-direction: column; gap: 12px; align-items: center; justify-content: center; height: 100vh; }
  #join input { font-size: 16px; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: inherit; }
  #join button { font-size: 16px; padding: 8px 20px; border-radius: 6px; border: 0; background: #238636; color: white; cursor: pointer; }
  #bar { display: flex; gap: 8px; align-items: center; padding: 6px 10px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 12px; }
  #status { color: #8b949e; }
  .badge { background: #21262d; border-radius: 10px; padding: 2px 8px; }
  #term { padding: 8px; }
  #app { display: none; }
  .err { color: #f85149; }
  #shutter { display: none; position: fixed; inset: 0; background: #0d1117f2; z-index: 10;
             align-items: center; justify-content: center; text-align: center; }
  #shutter .card { font-size: 22px; line-height: 1.6; background: #161b22; border: 1px solid #30363d;
                   border-radius: 12px; padding: 32px 48px; }
  #shutter small { color: #8b949e; }
  #main { display: flex; height: calc(100vh - 31px); }
  #term { flex: 1; min-width: 0; }
  #composer { width: 340px; display: flex; flex-direction: column; border-left: 1px solid #30363d; background: #10151c; }
  #chead { padding: 8px 10px; font-size: 12px; border-bottom: 1px solid #30363d; }
  #chead small { color: #8b949e; display: block; }
  #cwrap { position: relative; flex: 1; }
  #cmirror, #cinput {
    position: absolute; inset: 0; padding: 10px; margin: 0; border: 0;
    font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space: pre-wrap; word-break: break-word; overflow-y: auto;
  }
  #cmirror { color: #e6edf3; pointer-events: none; }
  #cmirror .caret { border-left: 2px solid; margin-left: -1px; }
  #cinput {
    background: transparent; color: transparent; caret-color: #e6edf3;
    resize: none; outline: none; width: 100%; height: 100%;
  }
  #cfoot { display: flex; gap: 8px; align-items: center; padding: 6px 10px; border-top: 1px solid #30363d; font-size: 12px; }
  #cauthors { flex: 1; color: #8b949e; }
  #cfoot button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 3px 10px; cursor: pointer; }
  #cmic.rec { background: #da3633; border-color: #f85149; }
  #cmic[hidden] { display: none; }
</style>
</head>
<body>
<div id="join">
  <h2>Join Tandem session</h2>
  <input id="name" placeholder="Your name" maxlength="40" autofocus>
  <button id="go">Join</button>
  <div id="joinerr" class="err"></div>
</div>
<div id="app">
  <div id="bar">
    <span class="badge">tandem</span>
    <span id="status">connecting…</span>
    <span id="who"></span>
    <span class="badge" title="Guests can watch and compose, never execute">view-only</span>
    <span id="lat" style="margin-left:auto;color:#8b949e"></span>
  </div>
  <div id="main">
    <div id="term"></div>
    <div id="composer">
      <div id="chead">Prompt Composer <small>everyone edits · only the host can send</small></div>
      <div id="cwrap">
        <div id="cmirror" aria-hidden="true"></div>
        <textarea id="cinput" spellcheck="false" placeholder="Type what should happen, in your words…"></textarea>
      </div>
      <div id="cfoot">
    <span id="cauthors"></span>
    <button id="cmic" title="Hold to dictate">🎤 hold</button>
    <button id="cundo" title="Undo your last edit">undo mine</button>
  </div>
    </div>
  </div>
  <div id="shutter">
    <div class="card">⏸<br>Host paused sharing<br><small>the view resumes when they unpause</small></div>
  </div>
</div>
<script src="/static/vendor/xterm.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
